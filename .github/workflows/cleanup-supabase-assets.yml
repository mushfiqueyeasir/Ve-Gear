name: Cleanup unused Supabase assets

on:
  schedule:
    # Every day at 00:00 UTC (~24h)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List orphans without deleting"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  cleanup:
    name: Delete unreferenced storage objects
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run asset cleanup
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run cleanup:assets:dry
          else
            npm run cleanup:assets
          fi
