<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
        &quot;Helvetica Neue&quot;, Arial, sans-serif;
      background-color: #fafafa;
    "
  >
    <table role="presentation" style="width: 100%; border-collapse: collapse">
      <tr>
        <td style="padding: 50px 20px">
          <!-- Main Container -->
          <table
            role="presentation"
            style="
              width: 100%;
              max-width: 600px;
              margin: 0 auto;
              border-collapse: collapse;
              background-color: #ffffff;
              border: 1px solid #e8e8e8;
            "
          >
            <!-- Logo -->
            <tr>
              <td
                style="
                  padding: 40px 40px 35px 40px;
                  text-align: center;
                  border-bottom: 1px solid #f0f0f0;
                "
              >
                <img
                  src="https://www.atorsbd.com/images/logo/logo.png"
                  alt="ATORS"
                  style="
                    max-width: 160px;
                    height: auto;
                    display: block;
                    margin: 0 auto;
                  "
                />
              </td>
            </tr>

            <!-- Title -->
            <tr>
              <td style="padding: 35px 40px 25px 40px; text-align: left">
                <h1
                  style="
                    margin: 0;
                    color: #000000;
                    font-size: 24px;
                    font-weight: 400;
                    letter-spacing: -0.5px;
                  "
                >
                  New Order Received
                </h1>
              </td>
            </tr>

            <!-- Customer Name -->
            <tr>
              <td style="padding: 0 40px 25px 40px; text-align: left">
                <table
                  role="presentation"
                  style="width: 100%; border-collapse: collapse"
                >
                  <tr>
                    <td style="padding: 0 0 10px 0">
                      <span
                        style="
                          color: #999999;
                          font-size: 11px;
                          font-weight: 500;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                        "
                        >Customer</span
                      >
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <span
                        style="
                          color: #000000;
                          font-size: 18px;
                          font-weight: 400;
                          letter-spacing: -0.3px;
                        "
                        >{{customer_name}}</span
                      >
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Customer Phone -->
            <tr>
              <td style="padding: 0 40px 25px 40px; text-align: left">
                <table
                  role="presentation"
                  style="width: 100%; border-collapse: collapse"
                >
                  <tr>
                    <td style="padding: 0 0 10px 0">
                      <span
                        style="
                          color: #999999;
                          font-size: 11px;
                          font-weight: 500;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                        "
                        >Phone</span
                      >
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <span
                        style="
                          color: #000000;
                          font-size: 18px;
                          font-weight: 400;
                          letter-spacing: -0.3px;
                        "
                        >{{customer_phone}}</span
                      >
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Order Items -->
            <tr>
              <td style="padding: 0 40px 25px 40px; text-align: left">
                <table
                  role="presentation"
                  style="width: 100%; border-collapse: collapse"
                >
                  <tr>
                    <td style="padding: 0 0 16px 0">
                      <table
                        role="presentation"
                        style="width: 100%; border-collapse: collapse"
                      >
                        <tr>
                          <td
                            style="
                              font-size: 11px;
                              font-weight: 500;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              color: #000000;
                              padding-bottom: 8px;
                              border-bottom: 1px solid #e8e8e8;
                            "
                          >
                            PRODUCT
                          </td>
                          <td
                            style="
                              font-size: 11px;
                              font-weight: 500;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              color: #000000;
                              text-align: center;
                              padding-bottom: 8px;
                              border-bottom: 1px solid #e8e8e8;
                            "
                          >
                            QUANTITY
                          </td>
                          <td
                            style="
                              font-size: 11px;
                              font-weight: 500;
                              text-transform: uppercase;
                              letter-spacing: 1px;
                              color: #000000;
                              text-align: right;
                              padding-bottom: 8px;
                              border-bottom: 1px solid #e8e8e8;
                            "
                          >
                            TOTAL
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <table
                        role="presentation"
                        style="width: 100%; border-collapse: collapse"
                      >
                        {{{order_items_html}}}
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Delivery Information -->
            <tr>
              <td style="padding: 0 40px 25px 40px; text-align: left">
                <table
                  role="presentation"
                  style="width: 100%; border-collapse: collapse"
                >
                  <tr>
                    <td style="padding: 0 0 10px 0">
                      <span
                        style="
                          color: #999999;
                          font-size: 11px;
                          font-weight: 500;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                        "
                        >Delivery Information</span
                      >
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <div
                        style="
                          padding: 16px;
                          background-color: #fafafa;
                          border: 1px solid #e8e8e8;
                          border-left: 3px solid #000000;
                        "
                      >
                        <div
                          style="
                            margin-bottom: 8px;
                            font-weight: 500;
                            color: #000000;
                          "
                        >
                          {{customer_name}}
                        </div>
                        <div
                          style="
                            margin-bottom: 4px;
                            color: #666666;
                            font-size: 14px;
                          "
                        >
                          {{delivery_address}}
                        </div>
                        <div style="color: #666666; font-size: 14px">
                          Phone: {{customer_phone}}
                        </div>
                      </div>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Order Summary -->
            <tr>
              <td style="padding: 0 40px 40px 40px; text-align: left">
                <table
                  role="presentation"
                  style="width: 100%; border-collapse: collapse"
                >
                  <tr>
                    <td>{{{order_summary_html}}}</td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                style="
                  padding: 30px 40px;
                  border-top: 1px solid #f0f0f0;
                  text-align: center;
                  background-color: #fafafa;
                "
              >
                <p
                  style="
                    margin: 0;
                    color: #999999;
                    font-size: 12px;
                    font-weight: 300;
                    letter-spacing: 0.3px;
                  "
                >
                  © 2024 ATORS. All rights reserved.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
